<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CineMatch — Movie Recommender</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --text:#e6edf3;
    --muted:#8b949e; --accent:#f5c518; --accent2:#e50914; --card:#1c2128;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,-apple-system,sans-serif;min-height:100vh}
  .container{max-width:1200px;margin:0 auto;padding:2rem 1.5rem}
  header{text-align:center;margin-bottom:2.5rem}
  header h1{font-size:2.4rem;letter-spacing:-.5px}
  header h1 .brand{color:var(--accent)}
  header p{color:var(--muted);margin-top:.5rem;font-size:1.05rem}
  .search-wrap{position:relative;max-width:640px;margin:0 auto}
  .search-row{display:flex;gap:.6rem}
  #search{flex:1;padding:.9rem 1.2rem;font-size:1.05rem;background:var(--panel);
    border:1px solid var(--border);border-radius:10px;color:var(--text);outline:none;transition:border .2s}
  #search:focus{border-color:var(--accent)}
  #go{padding:.9rem 1.6rem;font-size:1rem;font-weight:600;background:var(--accent);
    color:#111;border:none;border-radius:10px;cursor:pointer;transition:transform .1s}
  #go:hover{transform:translateY(-1px)}
  #go:disabled{opacity:.5;cursor:wait}
  #suggestions{position:absolute;top:calc(100% + 6px);left:0;right:0;background:var(--panel);
    border:1px solid var(--border);border-radius:10px;max-height:300px;overflow-y:auto;z-index:20;display:none}
  #suggestions div{padding:.65rem 1.1rem;cursor:pointer;display:flex;justify-content:space-between}
  #suggestions div:hover,#suggestions div.active{background:var(--card)}
  #suggestions .yr{color:var(--muted);font-size:.9rem}
  #status{text-align:center;margin:1.4rem 0;color:var(--muted);min-height:1.4rem}
  #status.error{color:#ff7b72}
  .source{display:flex;gap:1.5rem;background:var(--panel);border:1px solid var(--border);
    border-radius:14px;padding:1.4rem;margin:1.5rem 0;align-items:flex-start}
  .source img{width:120px;border-radius:8px;flex-shrink:0}
  .source h2{font-size:1.5rem;margin-bottom:.3rem}
  .source .meta,.card .meta{color:var(--muted);font-size:.9rem;margin-bottom:.6rem}
  .source .plot{line-height:1.55;font-size:.97rem}
  .badge{display:inline-block;background:var(--accent);color:#111;font-weight:700;
    border-radius:6px;padding:.1rem .5rem;font-size:.85rem;margin-left:.5rem}
  h3.section{margin:1.8rem 0 1rem;font-size:1.25rem;color:var(--muted);font-weight:600}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:1.2rem}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;
    display:flex;flex-direction:column;transition:transform .15s,border-color .15s;cursor:pointer}
  .card:hover{transform:translateY(-4px);border-color:var(--accent)}
  .poster{width:100%;aspect-ratio:2/3;object-fit:cover;background:#000}
  .card .body{padding:.9rem;display:flex;flex-direction:column;gap:.35rem;flex:1}
  .card h4{font-size:1rem;line-height:1.3}
  .card .plot{color:var(--muted);font-size:.82rem;line-height:1.45;display:-webkit-box;
    -webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;margin-top:auto}
  .scorebar{height:5px;background:var(--border);border-radius:3px;margin-top:.5rem;overflow:hidden}
  .scorebar span{display:block;height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent))}
  .rating{color:var(--accent);font-weight:700;font-size:.88rem}
  footer{text-align:center;color:var(--muted);font-size:.85rem;margin-top:3rem;
    padding-top:1.2rem;border-top:1px solid var(--border)}
  @media(max-width:600px){.source{flex-direction:column}.source img{width:100px}}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1><span class="brand">Cine</span>Match</h1>
    <p>Content-based movie recommendations from the IMDb Top 250</p>
  </header>

  <div class="search-wrap">
    <div class="search-row">
      <input id="search" type="text" placeholder="Type a movie title, e.g. The Godfather…" autocomplete="off">
      <button id="go">Recommend</button>
    </div>
    <div id="suggestions"></div>
  </div>

  <div id="status"></div>
  <div id="results"></div>

  <footer>TF-IDF plot similarity + weighted genre/director/cast metadata &middot; FastAPI &middot; scikit-learn</footer>
</div>

<script>
const $ = id => document.getElementById(id);
let catalog = [], activeIdx = -1;

async function loadCatalog(){
  try{
    const r = await fetch('/api/movies');
    catalog = (await r.json()).movies;
  }catch(e){ setStatus('Could not load movie catalog. Is the API running?', true); }
}

function setStatus(msg, isErr=false){
  const s = $('status');
  s.textContent = msg; s.className = isErr ? 'error' : '';
}

function renderSuggestions(items){
  const box = $('suggestions');
  if(!items.length){ box.style.display='none'; box.innerHTML=''; return; }
  box.innerHTML = items.map((m,i)=>
    `<div data-title="${m.title.replace(/"/g,'&quot;')}" class="${i===activeIdx?'active':''}">
       <span>${m.title}</span><span class="yr">${m.year} · ★ ${m.imdb_rating}</span></div>`).join('');
  box.style.display='block';
  box.querySelectorAll('div').forEach(d=>d.onclick=()=>{ $('search').value=d.dataset.title; hideSuggestions(); recommend(); });
}
function hideSuggestions(){ activeIdx=-1; renderSuggestions([]); }

$('search').addEventListener('input', e=>{
  const q = e.target.value.trim().toLowerCase(); activeIdx=-1;
  if(q.length<2){ hideSuggestions(); return; }
  renderSuggestions(catalog.filter(m=>m.title.toLowerCase().includes(q)).slice(0,8));
});
$('search').addEventListener('keydown', e=>{
  const box=$('suggestions'), n=box.children.length;
  if(e.key==='ArrowDown'&&n){ activeIdx=(activeIdx+1)%n; refreshActive(); e.preventDefault(); }
  else if(e.key==='ArrowUp'&&n){ activeIdx=(activeIdx-1+n)%n; refreshActive(); e.preventDefault(); }
  else if(e.key==='Enter'){ if(activeIdx>=0&&n){ $('search').value=box.children[activeIdx].dataset.title; } hideSuggestions(); recommend(); }
  else if(e.key==='Escape'){ hideSuggestions(); }
});
function refreshActive(){ [...$('suggestions').children].forEach((d,i)=>d.classList.toggle('active',i===activeIdx)); }
document.addEventListener('click', e=>{ if(!e.target.closest('.search-wrap')) hideSuggestions(); });
$('go').onclick = recommend;

function posterImg(src, title){
  const fallback = 'data:image/svg+xml,' + encodeURIComponent(
    '<svg xmlns="http://www.w3.org/2000/svg" width="300" height="450"><rect width="100%" height="100%" fill="#111"/><text x="50%" y="50%" fill="#555" font-size="20" text-anchor="middle">No poster</text></svg>');
  return `<img class="poster" loading="lazy" src="${src||fallback}" alt="${title}" onerror="this.src='${fallback}'">`;
}

async function recommend(){
  const title = $('search').value.trim();
  if(!title) return;
  hideSuggestions();
  $('go').disabled = true; setStatus('Finding similar movies…'); $('results').innerHTML='';
  try{
    const r = await fetch('/api/recommend', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({title, top_n:10})
    });
    const data = await r.json();
    if(!r.ok) throw new Error(data.detail || 'Request failed');
    render(data);
    setStatus(data.matched_title.toLowerCase()!==title.toLowerCase() ? `Showing results for "${data.matched_title}"` : '');
  }catch(e){ setStatus(e.message, true); }
  finally{ $('go').disabled=false; }
}

function render(data){
  const s = data.source_movie;
  const recs = data.recommendations;
  $('results').innerHTML = `
    <div class="source">
      ${posterImg(s.poster, s.title)}
      <div>
        <h2>${s.title} <span class="badge">★ ${s.imdb_rating??'—'}</span></h2>
        <div class="meta">${s.year} · ${s.rated} · ${s.runtime} · ${s.genre}<br>Dir. ${s.director}</div>
        <p class="plot">${s.plot}</p>
      </div>
    </div>
    <h3 class="section">Because you liked ${s.title} — top ${recs.length} matches</h3>
    <div class="grid">
      ${recs.map(m=>`
        <div class="card" onclick="$('search').value='${m.title.replace(/'/g,"\\'")}';recommend();window.scrollTo({top:0,behavior:'smooth'})">
          ${posterImg(m.poster, m.title)}
          <div class="body">
            <h4>${m.title}</h4>
            <div class="meta">${m.year} · ${m.genre.split(',')[0]}</div>
            <span class="rating">★ ${m.imdb_rating??'—'} IMDb</span>
            <p class="plot">${m.plot}</p>
            <div class="scorebar" title="similarity ${(m.similarity*100).toFixed(1)}%">
              <span style="width:${Math.min(100,m.similarity*100).toFixed(1)}%"></span>
            </div>
          </div>
        </div>`).join('')}
    </div>`;
}

loadCatalog();
</script>
</body>
</html>
